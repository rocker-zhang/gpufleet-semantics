# Remote secret-leak backstop for the OPEN gpufleet modules.
# Complements — does NOT replace — the LOCAL compliance gate (RULES.md §L ⑤·5).
name: secret-scan
on:
  push:
    branches: [main]
  pull_request:
jobs:
  gitleaks:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
