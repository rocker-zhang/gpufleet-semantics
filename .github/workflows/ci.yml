name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          install-mode: goinstall
          version: v1.62.2

  test:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go test -race
        run: go test -race -count=1 ./...

  build:
    needs: [test]
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: cross build (CGO disabled, mock-NVML default)
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: go build ./...

  # TASK-0031: prove the RELEASE consumption path (resolve the proto gen module
  # by its pinned tag, no local `replace`). See agent/ci.yml for the full
  # rationale. PREREQUISITE (outside this repo): proto publishes tag
  # `gen/go/v0.1.0` + private-repo auth via GOPRIVATE. SOFT until repo variable
  # PROTO_GEN_TAG_PUBLISHED=true. (go 1.26 here matches go.mod's `go 1.26.0`.)
  require-by-tag:
    needs: [test]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: resolve gen module by pinned tag (no replace)
        env:
          VERIFY_BY_TAG_SOFT: ${{ vars.PROTO_GEN_TAG_PUBLISHED == 'true' && '0' || '1' }}
        run: bash ci/verify-by-tag.sh

  supply-chain:
    needs: [test]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: govulncheck
        # TASK-0054: pin govulncheck (no `@latest`) so a CI run is reproducible
        # and a new tool release can't silently change the gate's behaviour.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...
      - name: syft SBOM
        uses: anchore/sbom-action@v0.17.9
        with:
          format: spdx-json
          output-file: sbom.spdx.json
      - name: upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.spdx.json
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # TASK-0054: pin the ruleset to the repo config (default rules +
          # testdata/fixture allowlist) so secret scanning is deterministic.
          GITLEAKS_CONFIG: .gitleaks.toml
